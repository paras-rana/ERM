services:
  postgres:
    image: postgres:16
    container_name: erm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: erm
      POSTGRES_USER: erm_user
      POSTGRES_PASSWORD: erm_pass123
    ports:
      - "5432:5432"
    volumes:
      - erm_postgres_data:/var/lib/postgresql/data

volumes:
  erm_postgres_data:
